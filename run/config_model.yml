mode: train

domain: "SO_JET"
data_dir: "/my/data/directory/"
model_dir: "/my/model/directory/"

data:
  # example filenames
  data_filenames: >
    MINT_1d_0061-0072_vor_cg_{domain}_mod.nc
    MINT_1d_0061-0072_eke_cg_{domain}.nc
    MINT_1d_0061-0072_mke_{domain}.nc
    MINT_1d_0061-0072_sa_cg_{domain}.nc
    mesh_mask_exp4_{domain}_xnemo.nc
  features: "vor coarse_ke sa"
  target: "fine_ke"

data_split: # split must sum to 1.0
  train_ratio: 0.83
  val_ratio: 0.085
  test_ratio: 0.085
  train_stride: 5
  shuffle_seed: 41 # keep fixed to ensure shuffling consistent across runs
  # Optional: omit seasons from the TRAIN split only (validation remains untouched).
  # For Southern Hemisphere: winter = JJA (6,7,8), summer = DJF (12,1,2).
  # To train on all data except summer:
  # train_omit_seasons: "summer"
  # To train on all data except winter:
  # train_omit_seasons: "winter"
  # Or omit explicit months (1..12):
  # train_omit_months: "6 7 8"

model: "unet"

# --- unet ---
architecture:
  base_filters: 64
  depth: 2

# --- cnn ---
# architecture:
#   filters: "128 64 64 64 1"
#   kernels: "(5,5) (3,3) (3,3) (3,3) (1,1)"
#   padding: "(2,2) (1,1) (1,1) (1,1) (0,0)"
#   dilation_rates: "1 1 1 1 1"

training:
  batch_size: 15
  epochs: 1
  dropout_rate: 0.01
  learning_rate: 0.001
  use_learning_rate_scheduler: false
  learning_rate_decay_steps_multiplier: 10
  learning_rate_decay_rate: 0.05
  use_early_stopping: true
  early_stopping_monitor: "val_loss"
  early_stopping_patience: 10
  early_stopping_min_delta: 0.001
  early_stopping_start_from_epoch: 30
  use_attention: false
  use_ema: true
  ema_momentum: 0.99

normalisation:
  local_norm: true
  global_norm: false
  # adjust if you want to supply your own
  norm_stats:
    vor:
      mean: -0.002294
      std: 0.1418
    coarse_ke_log:
      mean: -3.729
      std: 1.733
    sa:
      mean: 1.9
      std: 0.6455

logging:
  verbose: true # if set to true -> greater verbosity
  verbose_output_filename: "./verbose_output.log"
  tensboard_log_dir: "."